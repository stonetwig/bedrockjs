<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Router Demo - BedrockJS</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }
    .app-container {
      display: flex;
      min-height: 100vh;
    }
    nav {
      width: 200px;
      background: #2c3e50;
      padding: 1rem;
    }
    nav h2 {
      color: white;
      margin-top: 0;
      font-size: 1.2em;
    }
    nav router-link {
      display: block;
      color: #ecf0f1;
      text-decoration: none;
      padding: 0.5rem;
      margin: 0.25rem 0;
      border-radius: 4px;
      cursor: pointer;
    }
    nav router-link:hover {
      background: #34495e;
    }
    main {
      flex: 1;
      padding: 2rem;
      background: #f5f5f5;
    }
    router-outlet {
      display: block;
    }
    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #666;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #ddd;
      border-top-color: #007acc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <nav>
      <h2>BedrockJS Router</h2>
      <router-link to="/">Home</router-link>
      <router-link to="/users">Users</router-link>
      <router-link to="/about">About</router-link>
    </nav>
    <main>
      <router-outlet></router-outlet>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
