<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bedrockjs sync — live chat</title>
    <style>
      body {
        font: 14px system-ui;
        max-width: 600px;
        margin: 2rem auto;
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 0;
        margin: 0;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .header {
        padding: 1rem;
        border-bottom: 1px solid #e5e5e5;
      }

      .back-link {
        color: #007acc;
        text-decoration: none;
        font-size: 12px;
        margin-bottom: 0.5rem;
        display: inline-block;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      h1 {
        margin: 0.5rem 0 0 0;
        font-size: 20px;
      }

      chat-app {
        display: flex;
        flex: 1;
        flex-direction: column;
      }

      .chat-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 1rem;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 1rem;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 1rem;
        background: #fafafa;
      }

      .empty {
        color: #999;
        text-align: center;
        padding: 2rem 1rem;
        font-style: italic;
      }

      .message {
        margin-bottom: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        background: white;
        border-left: 3px solid #ddd;
      }

      .message.own {
        background: #e3f2fd;
        border-left-color: #2196f3;
        margin-left: 2rem;
      }

      .message.other {
        background: #f5f5f5;
        border-left-color: #999;
        margin-right: 2rem;
      }

      .author {
        font-size: 11px;
        color: #999;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }

      .text {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
      }

      .time {
        font-size: 11px;
        color: #bbb;
        margin-top: 0.25rem;
      }

      .input-form {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .message-input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }

      .message-input:focus {
        outline: none;
        border-color: #2196f3;
        box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
      }

      .send-btn {
        padding: 0.75rem 1.5rem;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .send-btn:hover {
        background: #1976d2;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(33, 150, 243, 0.3);
      }

      .send-btn:active {
        transform: translateY(0);
      }

      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 0.5rem;
        padding-top: 0.5rem;
        border-top: 1px solid #e5e5e5;
      }

      code {
        background: #f5f5f5;
        padding: 0.2em 0.4em;
        border-radius: 3px;
        font-family: monospace;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="./index.html" class="back-link">← Back to examples</a>
      <h1>Live Chat</h1>
    </div>
    <chat-app></chat-app>
    <script type="module" src="./chat.js"></script>
  </body>
</html>
