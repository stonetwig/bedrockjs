<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter - BedrockJS</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
    }
    my-counter {
      display: block;
      padding: 1rem;
      background: #f5f5f5;
      border-radius: 8px;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <h1>Counter Example</h1>
  <p>Demonstrates reactive properties and event handling.</p>

  <my-counter></my-counter>
  <my-counter count="10"></my-counter>

  <script type="module">
    import { html, Component } from '../../src/index.js';

    class MyCounter extends Component {
      static tag = 'my-counter';
      static properties = {
        count: { type: Number, default: 0 }
      };

      increment = () => {
        this.count++;
      };

      decrement = () => {
        this.count--;
      };

      reset = () => {
        this.count = 0;
      };

      render() {
        return html`
          <div>
            <h2>Count: ${this.count}</h2>
            <div style="display: flex; gap: 0.5rem;">
              <button on-click=${this.decrement}>-</button>
              <button on-click=${this.increment}>+</button>
              <button on-click=${this.reset}>Reset</button>
            </div>
          </div>
        `;
      }
    }

    MyCounter.register();
  </script>
</body>
</html>
